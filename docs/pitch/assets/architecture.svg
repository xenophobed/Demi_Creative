<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 600" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C4B5FD"/>
    </marker>
    <marker id="arrow-pink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F472B6"/>
    </marker>
    <linearGradient id="ctxBus" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Child message bubble (top-left, small) -->
  <g>
    <rect x="40" y="40" width="220" height="56" rx="28" fill="#F472B6" opacity="0.2" stroke="#F472B6" stroke-width="1.5"/>
    <text x="150" y="74" text-anchor="middle" fill="#F8FAFC" font-size="16">💬 child message</text>
  </g>

  <!-- Arrow from child message to proxy -->
  <line x1="260" y1="68" x2="430" y2="120" stroke="#C4B5FD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Proxy / orchestrator node -->
  <g>
    <rect x="430" y="90" width="300" height="100" rx="14" fill="#1E293B" stroke="#F472B6" stroke-width="2.5"/>
    <text x="580" y="125" text-anchor="middle" fill="#F472B6" font-size="20" font-weight="700">My Agent (proxy)</text>
    <text x="580" y="152" text-anchor="middle" fill="#F8FAFC" font-size="13">orchestrator · intent routing</text>
    <text x="580" y="172" text-anchor="middle" fill="#94A3B8" font-size="12" font-style="italic">deterministic + LLM</text>
  </g>

  <!-- 4 specialist nodes -->
  <g>
    <rect x="40" y="260" width="240" height="80" rx="12" fill="#0F172A" stroke="#C4B5FD" stroke-width="2"/>
    <text x="160" y="290" text-anchor="middle" fill="#F8FAFC" font-size="16" font-weight="600">📖 image_story</text>
    <text x="160" y="315" text-anchor="middle" fill="#94A3B8" font-size="12">drawing → story</text>
  </g>
  <g>
    <rect x="300" y="260" width="240" height="80" rx="12" fill="#0F172A" stroke="#C4B5FD" stroke-width="2"/>
    <text x="420" y="290" text-anchor="middle" fill="#F8FAFC" font-size="16" font-weight="600">🌟 interactive_story</text>
    <text x="420" y="315" text-anchor="middle" fill="#94A3B8" font-size="12">branching adventure</text>
  </g>
  <g>
    <rect x="560" y="260" width="240" height="80" rx="12" fill="#0F172A" stroke="#C4B5FD" stroke-width="2"/>
    <text x="680" y="290" text-anchor="middle" fill="#F8FAFC" font-size="16" font-weight="600">🎙️ kids_daily</text>
    <text x="680" y="315" text-anchor="middle" fill="#94A3B8" font-size="12">news podcast</text>
  </g>
  <g>
    <rect x="820" y="260" width="240" height="80" rx="12" fill="#0F172A" stroke="#C4B5FD" stroke-width="2"/>
    <text x="940" y="290" text-anchor="middle" fill="#F8FAFC" font-size="16" font-weight="600">🔊 audio_narration tool</text>
    <text x="940" y="315" text-anchor="middle" fill="#94A3B8" font-size="12">TTS, not subagent</text>
  </g>

  <!-- Connector lines proxy → specialists -->
  <line x1="580" y1="190" x2="160" y2="260" stroke="#C4B5FD" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="190" x2="420" y2="260" stroke="#C4B5FD" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="190" x2="680" y2="260" stroke="#C4B5FD" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="190" x2="940" y2="260" stroke="#C4B5FD" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- A2A extensible callout -->
  <g>
    <text x="1080" y="305" text-anchor="middle" fill="#A78BFA" font-size="32">+</text>
    <text x="1080" y="330" text-anchor="middle" fill="#94A3B8" font-size="11">A2A</text>
  </g>

  <!-- Safety review subagent (distinguished by pink border, thicker) -->
  <g>
    <rect x="380" y="400" width="400" height="80" rx="12" fill="#0F172A" stroke="#F472B6" stroke-width="3"/>
    <text x="580" y="430" text-anchor="middle" fill="#F472B6" font-size="18" font-weight="700">🛡️ safety_review subagent</text>
    <text x="580" y="455" text-anchor="middle" fill="#F8FAFC" font-size="14" font-style="italic">runs on EVERY reply before delivery</text>
  </g>

  <!-- Lines specialists → safety -->
  <line x1="160" y1="340" x2="500" y2="400" stroke="#C4B5FD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="420" y1="340" x2="540" y2="400" stroke="#C4B5FD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="680" y1="340" x2="620" y2="400" stroke="#C4B5FD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="940" y1="340" x2="660" y2="400" stroke="#C4B5FD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Shared context bus -->
  <rect x="40" y="525" width="1080" height="50" rx="25" fill="url(#ctxBus)" stroke="#C4B5FD" stroke-width="2"/>
  <text x="580" y="557" text-anchor="middle" fill="#F8FAFC" font-size="15" font-weight="600">
    🔗 context: persona · tone · style · skills · topics · goals · child_id · age
  </text>

  <text x="580" y="588" text-anchor="middle" fill="#94A3B8" font-size="12" font-style="italic">
    recurring characters: character_repo + vector memory
  </text>

  <!-- Context bus connectors to each agent column (subtle vertical lines) -->
  <line x1="160" y1="500" x2="160" y2="525" stroke="#A78BFA" stroke-width="1" stroke-dasharray="2,3" opacity="0.6"/>
  <line x1="420" y1="500" x2="420" y2="525" stroke="#A78BFA" stroke-width="1" stroke-dasharray="2,3" opacity="0.6"/>
  <line x1="580" y1="490" x2="580" y2="525" stroke="#A78BFA" stroke-width="1" stroke-dasharray="2,3" opacity="0.6"/>
  <line x1="680" y1="500" x2="680" y2="525" stroke="#A78BFA" stroke-width="1" stroke-dasharray="2,3" opacity="0.6"/>
  <line x1="940" y1="500" x2="940" y2="525" stroke="#A78BFA" stroke-width="1" stroke-dasharray="2,3" opacity="0.6"/>
</svg>
